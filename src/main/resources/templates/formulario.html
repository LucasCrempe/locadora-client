<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário - API Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Dados da Locadora</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/salvar}" th:object="${locadora}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label>Nome</label>
                        <input type="text" th:field="*{nome}" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label>CNPJ</label>
                        <input type="text" th:field="*{cnpj}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Senha</label>
                        <input type="password" th:field="*{senha}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Cidade</label>
                        <input type="text" th:field="*{cidade}" class="form-control" required>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Salvar (POST/PUT)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
