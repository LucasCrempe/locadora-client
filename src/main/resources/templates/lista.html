<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cliente API - Locadoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Consumo de API - Locadoras</h2>
            <a th:href="@{/novo}" class="btn btn-primary">+ Cadastrar via API</a>
        </div>
        
        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CNPJ</th>
                    <th>Email</th>
                    <th>Cidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="locadora : ${locadoras}">
                    <td th:text="${locadora.id}"></td>
                    <td th:text="${locadora.nome}"></td>
                    <td th:text="${locadora.cnpj}"></td>
                    <td th:text="${locadora.email}"></td>
                    <td th:text="${locadora.cidade}"></td>
                    <td>
                        <a th:href="@{/editar/{id}(id=${locadora.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/excluir/{id}(id=${locadora.id})}" class="btn btn-sm btn-danger">Excluir</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
